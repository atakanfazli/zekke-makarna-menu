<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zekke Makarna Menü</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
body {
    margin:0;
    font-family: 'Inter', sans-serif;
    background:#0f3d2e;
    color:#f5f1e9;
}
.container {
    max-width:700px;
    margin:auto;
    padding:20px;
}
.logo {
    text-align:center;
    margin-top:20px;
}
.logo img {
    width:160px;
}
.title {
    text-align:center;
    font-family:'Playfair Display', serif;
    font-size:28px;
    margin:10px 0 30px;
}
.section {
    margin-bottom:30px;
}
.section h2 {
    font-family:'Playfair Display', serif;
    border-bottom:1px solid rgba(255,255,255,0.2);
    padding-bottom:8px;
}
.item {
    display:flex;
    justify-content:space-between;
    margin:10px 0;
}
.price {
    color:#e8c27a;
}
.fade {
    animation:fadeIn 1s ease;
}
@keyframes fadeIn {
    from {opacity:0; transform:translateY(10px);}
    to {opacity:1; transform:translateY(0);}
}
</style>
</head>
<body>

<div class="container fade">
    <div class="logo">
        <img src="logo.png" alt="Zekke Logo">
    </div>
    <div class="title">Hoş Geldiniz</div>

    <div class="section">
        <h2>Makarnalar</h2>
        <div class="item"><span>Penne Arrabiata</span><span class="price">250 TL</span></div>
        <div class="item"><span>Penne Napoliten</span><span class="price">275 TL</span></div>
        <div class="item"><span>Fusilli Pesto</span><span class="price">350 TL</span></div>
    </div>

    <div class="section">
        <h2>Tavuklar</h2>
        <div class="item"><span>BBQ Tavuk</span><span class="price">275 TL</span></div>
        <div class="item"><span>Soya Soslu Tavuk</span><span class="price">275 TL</span></div>
    </div>

    <div class="section">
        <h2>İçecekler</h2>
        <div class="item"><span>Kola</span><span class="price">60 TL</span></div>
        <div class="item"><span>Meyve Suyu</span><span class="price">65 TL</span></div>
    </div>

</div>

</body>
</html>
