<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZEKKE MAKARNA | Dijital Menü</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    :root {
      --green: #0f3d2e;
      --green-soft: #1f5c46;
      --cream: #f6f3ed;
      --gold: #d6b36a;
      --text: #1b2e25;
      --muted: #6c7a72;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      color: var(--text);
    }

    .topbar {
      position: sticky;
      top: 0;
      background: white;
      border-bottom: 1px solid #eee;
      z-index: 10;
    }

    .topbar-inner {
      width: min(1100px, 92%);
      margin: auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 0;
    }

    .brand-mini {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--green);
    }

    .top-links a {
      text-decoration: none;
      color: var(--green);
      margin-left: 10px;
      font-size: 0.85rem;
    }

    .container {
      width: min(1100px, 92%);
      margin: auto;
      padding: 30px 0 60px;
    }

    .hero {
      background: linear-gradient(135deg, var(--green), var(--green-soft));
      color: white;
      border-radius: 26px;
      padding: 40px 26px;
      text-align: center;
      box-shadow: 0 15px 40px rgba(0,0,0,0.15);
    }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.8rem;
      margin: 0;
      letter-spacing: 1px;
    }

    .hero p {
      margin-top: 10px;
      color: #e0ebe5;
      font-size: 0.95rem;
    }

    .section {
      margin-top: 30px;
      background: white;
      border-radius: 20px;
      padding: 22px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.05);
    }

    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.5rem;
      margin-bottom: 6px;
      color: var(--green);
    }

    .section-title::after {
      content: "";
      display: block;
      width: 40px;
      height: 3px;
      background: var(--gold);
      margin-top: 6px;
    }

    .section-subtitle {
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 16px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 14px;
    }

    .item {
      border: 1px solid #eee;
      border-radius: 16px;
      padding: 14px;
      transition: 0.2s ease;
      background: #fff;
    }

    .item:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
    }

    .item-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .item h3 {
      margin: 0;
      font-size: 1rem;
    }

    .price {
      color: var(--green);
      font-weight: 700;
    }

    .desc {
      margin-top: 6px;
      font-size: 0.9rem;
      color: var(--muted);
    }

    footer {
      text-align: center;
      margin-top: 30px;
      color: #777;
      font-size: 0.85rem;
    }

  </style>
</head>
<body>

  <div class="topbar">
    <div class="topbar-inner">
      <div class="brand-mini">ZEKKE MAKARNA</div>
      <div class="top-links">
        <a href="#makarnalar">Makarnalar</a>
        <a href="#tavuklar">Tavuk</a>
        <a href="#tatlilar">Tatlı</a>
        <a href="#icecekler">İçecek</a>
      </div>
    </div>
  </div>

  <main class="container">

    <section class="hero">
      <h1>ZEKKE MAKARNA</h1>
      <p>İtalyan esintili makarna lezzetleri ve özel tarifler</p>
    </section>

    <!-- içerik aynı kaldı -->

    <footer>
      ZEKKE MAKARNA dijital menüsü
    </footer>

  </main>

</body>
</html>
